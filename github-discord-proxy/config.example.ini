# Copy this file to github-webhook/.config, fill in your values, then lock it
# down with: chmod 400 github-webhook/.config
# The .htaccess denies web access to .config, and the 0400 permission stops the
# Apache static-file user from reading it; the CGI reads it because it runs as
# the file's owner.

[discord]
# Discord: Server Settings -> Integrations -> Webhooks -> New Webhook, point it
# at the target channel, then "Copy Webhook URL".
webhook_url = https://discord.com/api/webhooks/REPLACE/WITH_REAL_WEBHOOK

# Optional name and avatar to show on each message. Leave empty to use the name
# and picture set on the webhook in Discord. avatar_url is the URL of an image.
username =
avatar_url =

[github]
# A random string you choose. Put the same value in the GitHub webhook's
# "Secret" field. The script acts only on deliveries whose signature matches.
# Generate one with:  openssl rand -hex 32
secret = REPLACE_WITH_A_LONG_RANDOM_STRING

# Only pull requests authored by these logins are announced.
# Comma-separated, case-insensitive. Leave empty to announce every author.
authors = octocat

# Restrict to these GitHub orgs or users (the repository owner).
# Comma-separated, case-insensitive. Leave empty to accept any.
orgs = octo-org

# Which pull_request actions to announce. "opened" covers new PRs, including
# drafts. You could add "reopened, ready_for_review" if you want those too.
actions = opened

[message]
# {url} and {title} are filled in from the pull request.
template = {url} <- {title}
# Hide Discord's link preview card so the line stays exactly as templated.
suppress_embeds = true
